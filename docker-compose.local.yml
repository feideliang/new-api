services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api:local
    container_name: new-api-local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NEW_API_LOCAL_PORT:-3300}:3000"
    volumes:
      - local_data:/data
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - local-network

  redis:
    image: redis:7-alpine
    container_name: new-api-local-redis
    restart: unless-stopped
    volumes:
      - local_redis_data:/data
    networks:
      - local-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-local-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - local_pg_data:/var/lib/postgresql/data
    networks:
      - local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  local_data:
  local_pg_data:
  local_redis_data:

networks:
  local-network:
    driver: bridge
